services:
  postgres:
    image: postgres:16-alpine
    container_name: repowiki-postgres
    environment:
      POSTGRES_DB: repowiki
      POSTGRES_USER: repowiki
      POSTGRES_PASSWORD: repowiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: repowiki-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: repowiki-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  redis_data:
  chroma_data:
